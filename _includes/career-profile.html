{% assign career-profile = site.data.data.career-profile %}
{% if career-profile %}
<section class="section summary-section">

  <h2 class="section-title">
    <span class="fa-stack fa-xs">
      <i class="fas fa-circle fa-stack-2x"></i>
      <i class="fas fa-user fa-stack-1x fa-inverse"></i>
    </span>
    <span data-lang="en">{{ career-profile.title-en }}</span>
    <span data-lang="pt">{{ career-profile.title-pt }}</span>
  </h2>

  <div class="summary" data-lang="en">
    {{ career-profile.summary-en | markdownify }}
  </div>
  <div class="summary" data-lang="pt">
    {{ career-profile.summary-pt | markdownify }}
  </div>
    
</section><!--//section-->
{% endif %}
